    <!-- Form Introduce Start -->
    <div id="introduce">
        <div class="container">
            <div class="container box-1">
                <h4 class="fw-bold text-center">INTRODUCE</h4>
                <div class="row justify-content-center introduce">
                    <div class="col-md-11">
                        <form>
                            <div class="mb-3">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" name="Name" aria-describedby="name"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="age" class="form-label">Age</label>
                                <input type="text" class="form-control" id="age" name="Age" required>
                            </div>
                            <div class="mb-3">
                                <label for="agency" class="form-label">Agency</label>
                                <select class="form-select" id="agency" name="Agency"
                                    aria-label="Default select example" required>
                                    <option selected> - </option>
                                    <option value="1">Company</option>
                                    <option value="2">Campus</option>
                                    <option value="3">School</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="agency-name" class="form-label">Agency Name</label>
                                <input type="text" class="form-control" id="agency-name" name="Agency Name" required>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="container box-2">
                <h4 class="fw-bold text-center">Question</h4>
                <div class="row justify-content-center question">
                    <div class="col-md-11">
                        <form>
                            <div class="mb-3">
                                <label for="view" class="form-label">Web View</label><br>
                                <div class="input-group mb-1">
                                    <div class="input-group-text">
                                        <input class="form-check-input mt-0" type="radio" value="Interesting"
                                            aria-label="Radio button for following text input" id="view"
                                            name="Web View">
                                    </div>
                                    <input type="text" class="form-control" aria-label="Text input with radio button"
                                        disabled value="Interesting" name="Web View">
                                </div>
                                <div class="input-group mb-4">
                                    <div class="input-group-text">
                                        <input class="form-check-input mt-0" type="radio" value="Not Attractive"
                                            aria-label="Radio button for following text input" id="view"
                                            name="Web View">
                                    </div>
                                    <input type="text" class="form-control" aria-label="Text input with radio button"
                                        disabled value="Not Attractive" name="Web View">
                                </div>

                                <div class="mb-3">
                                    <label for="content" class="form-label">Web Content</label><br>
                                    <div class="input-group mb-1">
                                        <div class="input-group-text">
                                            <input class="form-check-input mt-0" type="radio" value="Complete"
                                                aria-label="Radio button for following text input" id="content"
                                                name="Web Content">
                                        </div>
                                        <input type="text" class="form-control"
                                            aria-label="Text input with radio button" disabled value="Complete"
                                            name="Web Content">
                                    </div>
                                    <div class="input-group mb-4">
                                        <div class="input-group-text">
                                            <input class="form-check-input mt-0" type="radio" value="Not Complete"
                                                aria-label="Radio button for following text input" id="content"
                                                name="Web Content">
                                        </div>
                                        <input type="text" class="form-control"
                                            aria-label="Text input with radio button" disabled value="Not Complete"
                                            name="Web Content">
                                    </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous">
    </script>
    <!-- Google Sheet JS -->
    <script>
        const scriptURL =
            'https://script.google.com/macros/s/AKfycbxiCWGpDSJZc5hCd-mzEWZngQBRn88PqKdpxfKPpLk1IN24KGJoGX-FkkScOu57LAgrow/exec'
        const form = document.forms['contact-form'];
        const btnKirim = document.querySelector('.btn-kirim');
        const btnLoading = document.querySelector('.btn-loading');
        const myAlert = document.querySelector('.my-alert');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            /* When click submit button */
            /* Show button loading, none the button send*/
            btnLoading.classList.toggle('d-none');
            btnKirim.classList.toggle('d-none');
            fetch(scriptURL, {
                    method: 'POST',
                    body: new FormData(form)
                })
                .then(response => {
                    /* Show button Send, none the button Loading*/
                    btnLoading.classList.toggle('d-none');
                    btnKirim.classList.toggle('d-none');

                    /* Show Alert */
                    myAlert.classList.toggle('d-none');
                    Swal.fire({
                        title: 'Thank You!!',
                        text: 'Have a visited My Portfolio',
                        imageUrl: 'https://c.tenor.com/KgkDyvM61poAAAAC/anime-dancing.gif',
                        imageWidth: 400,
                        imageHeight: 200,
                        imageAlt: 'Custom image',
                    })

                    /* Reset Form */
                    form.reset();

                    console.log('Success!', response)
                })
                .catch(error => console.error('Error!', error.message))
        })
    </script>
    <!-- Main JS -->
